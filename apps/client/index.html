<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <link rel="icon" href="data:," />
    <title>Inkling Lane A</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, sans-serif; background: #f3ead7; color: #263238; }
      * { box-sizing: border-box; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 16px; }
      main { width: min(100%, 1000px); }
      header { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 12px; }
      h1 { font-size: clamp(1.25rem, 3vw, 2rem); margin: 0 auto 0 0; }
      button, .file-label { border: 2px solid #263238; border-radius: 999px; background: #fffaf0; color: #263238; cursor: pointer; font: inherit; font-weight: 700; padding: 8px 14px; }
      button:hover, .file-label:hover { background: #ffedb5; }
      input[type="file"] { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); }
      #game-shell { overflow: hidden; border: 4px solid #263238; border-radius: 18px; background: #fffaf0; box-shadow: 0 12px 30px #26323830; }
      #game { width: 100%; aspect-ratio: 16 / 9; }
      #game canvas { display: block; width: 100% !important; height: 100% !important; }
      #game-status { margin: 10px 4px 0; font-weight: 750; }
      .hint { margin: 4px; color: #52636b; }
      .error { color: #a32020; }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Inkling: your drawing is playable</h1>
        <label class="file-label" for="spec-file">Load GameSpec JSON</label>
        <input id="spec-file" type="file" accept="application/json,.json" />
        <button id="restart" type="button">Restart game</button>
      </header>
      <section id="game-shell" aria-label="Playable Inkling game">
        <div id="game" tabindex="0"></div>
      </section>
      <p id="game-status" data-game-state="loading" aria-live="polite">Loading Lane A…</p>
      <p class="hint">Move with A/D or arrow keys. Jump with W, ↑, Space, or the touch controls.</p>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
